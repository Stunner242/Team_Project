<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
   <div class="main">
      <h1>Enter your details</h1>
      <form id="form">
        <label for="first">
            FirstName:
        </label>
        <input type="text" id="name" name="first" 
            placeholder="Enter your FirstName" required>
        <span id="name_error" class="error"></span>

        <label for="email">
            Email id:
        </label>
        <input type="email" id="email" name="email" 
            placeholder="Enter your College email id" required>
        <span id="email_error" class="error"></span>

        <label for="Roll_no">
            Roll_no:
        </label>
        <input type="text" id="Roll_no" name="ID"
            placeholder="Enter your Roll_no" required>
        <span id="Rollno_error" class="error"></span>

        <label for="password">
            Password:
        </label>
        <input type="password" id="password" name="password"
            placeholder="Create Your Password" required>
        <span id="pass_error" class="error"></span>

        <label for="confirm_password">
            Confirm Password:
        </label>
        <input type="password" id="confirm_password" name="confirm_password"
            placeholder="Confirm Password" required>
        <span id="confirm_pass_error" class="error"></span>
        <select id="Gender" name="Gender" required>
            <option value="" disabled selected>Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <a href="record.html" class="button">
            Submit
        </a>
    </form>
   </div> 
   <script src="index.js"></script>
</body>
</html>
